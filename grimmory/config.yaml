name: "Grimmory"
version: "v3.1.0"
slug: "grimmory"
description: "Self-hosted book & comic library (EPUB, PDF, CBZ, MOBI) with metadata, OPDS, reading progress and multi-user support."
url: "https://github.com/grimmory-tools/grimmory"
arch:
  - amd64
  - aarch64
init: false
boot: manual
legacy: true
image: "ghcr.io/grimmory-tools/grimmory"
services:
  - "mysql:need"
ports:
  6060/tcp: 6060
webui: "http://[HOST]:[PORT:6060]"
watchdog: "http://[HOST]:[PORT:6060]/api/v1/healthcheck"
map:
  - media:rw
  - share:rw
  - addon_config:rw
options:
  DATABASE_URL: "jdbc:mariadb://core-mariadb:3306/grimmory?useUnicode=true&characterEncoding=utf8mb4"
  DATABASE_USERNAME: "grimmory"
  DATABASE_PASSWORD: "grimmory_secret"
  TZ: "Europe/Berlin"
  SWAGGER_ENABLED: "false"
  DISK_TYPE: "LOCAL"
schema:
  DATABASE_URL: str
  DATABASE_USERNAME: str
  DATABASE_PASSWORD: password
  TZ: str
  SWAGGER_ENABLED: str
  DISK_TYPE: str
backup: cold
stage: experimental
