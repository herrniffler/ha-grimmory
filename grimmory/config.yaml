name: "Grimmory"
version: "v3.1.0"
slug: "grimmory"
description: "Self-hosted book & comic library (EPUB, PDF, CBZ, MOBI) with metadata, OPDS, reading progress and multi-user support."
url: "https://github.com/grimmory-tools/grimmory"
arch:
  - amd64
  - aarch64
init: false
boot: manual
image: "ghcr.io/grimmory-tools/grimmory"
services:
  - "mysql:need"
ports:
  6060/tcp: 6060
webui: "http://[HOST]:[PORT:6060]"
watchdog: "http://[HOST]:[PORT:6060]/api/v1/healthcheck"
map:
  - media:rw
  - share:rw
  - addon_config:rw
options:
  timezone: "Europe/Berlin"
  db_host: "core-mariadb"
  db_port: 3306
  db_name: "grimmory"
  db_user: "grimmory"
  db_password: "grimmory_secret"
  swagger_enabled: false
schema:
  timezone: str
  db_host: str
  db_port: int
  db_name: str
  db_user: str
  db_password: password
  swagger_enabled: bool
backup: cold
stage: experimental